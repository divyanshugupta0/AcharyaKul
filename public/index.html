<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OLMS</title>
    <style>
      :root {
        --bg-1: #f9f6f0;
        --bg-2: #e6f4ff;
        --accent: #1a937b;
        --text: #1f2a35;
        --muted: #5f6c7b;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "Trebuchet MS", "Gill Sans", "Candara", sans-serif;
        background: radial-gradient(circle at top left, rgba(26, 147, 123, 0.08), transparent 55%),
          radial-gradient(circle at 15% 80%, rgba(244, 162, 97, 0.12), transparent 55%),
          linear-gradient(130deg, var(--bg-1), var(--bg-2));
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        background: #ffffff;
        padding: 28px;
        border-radius: 18px;
        box-shadow: 0 18px 40px rgba(20, 35, 55, 0.12);
        width: min(420px, 90vw);
        display: grid;
        gap: 14px;
      }
      h1 { font-size: 24px; }
      p { color: var(--muted); font-size: 14px; }
      .links { display: grid; gap: 10px; }
      a {
        text-decoration: none;
        padding: 12px 16px;
        border-radius: 12px;
        background: rgba(26, 147, 123, 0.1);
        color: var(--text);
        font-weight: 600;
        border: 1px solid rgba(26, 147, 123, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>OLMS Local Portals</h1>
      <p>Select a workspace to continue.</p>
      <div class="links">
        <a href="/student/">Student Portal</a>
        <a href="/teacher/">Teacher Portal</a>
        <a href="/admin/">Admin Portal</a>
      </div>
    </div>
  </body>
</html>
